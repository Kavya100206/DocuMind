services:
  - type: web
    name: documind
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter           # starter = 512MB RAM, 0.5 CPU — enough for this app
    healthCheckPath: /health

    # Environment variables — set SECRET values in Render dashboard
    # Never hardcode secrets here!
    envVars:
      - key: GROQ_API_KEY
        sync: false         # Set this manually in Render dashboard

      - key: DATABASE_URL
        sync: false         # Set this manually in Render dashboard (NeonDB URL)

      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      - key: LOCAL_EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5

      - key: DEBUG
        value: "false"

      - key: SIMILARITY_THRESHOLD
        value: "0.12"

      - key: TOP_K_RESULTS
        value: "15"

      - key: RERANKER_TOP_N
        value: "4"

      - key: MAX_CHUNKS_PER_DOC
        value: "5"

      - key: TRANSFORMERS_OFFLINE
        value: "1"

      - key: HF_DATASETS_OFFLINE
        value: "1"
